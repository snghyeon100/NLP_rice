# WJ: zero-shot cross-lingual likelihood unlearning
#
# Run from repo root:
#   CUDA_VISIBLE_DEVICES=0,1 python unlearning_methods/unlearn_wj/train.py

model_family: qwen3_5_2b
model_path: ./finetuned/finetuned_100
method_name: wj

# Source forget supervision. Target-language forget data is evaluation-only.
source_language: en
target_languages: [ko]
forget_split: forget01
source_retain_split: retain99
source_data_path: locuslab/TOFU

# Multilingual retain/utility pools. These should not contain forget01 rows.
retain_multi_path: ./dataset/retain99_merged_all_10_lang
utility_multi_path: ./dataset/retain99_merged_all_10_lang
parallel_anchor_path: ./dataset/retain99_merged_all_10_lang

question_key: question
answer_key: answer
max_length: 500
max_train_examples: null

# Training
lr: 2e-5
batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 5
max_steps: null
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# Precision and device placement. On Titan XP use fp16=true, bf16=false.
bf16: false
fp16: true
gpu_train: 0
gpu_ref: 1

# Forget objective. `npo` is the default because it is tied to answer likelihood
# while remaining more stable than pure negative CE.
forget_objective: npo
npo_beta: 1.0

loss_weights:
  forget: 1.0
  retain_source_ce: 0.5
  retain_multi_ce: 0.5
  utility_multi_ce: 0.25
  retain_source_kl: 0.1
  retain_multi_kl: 0.1
  utility_multi_kl: 0.0

# Layer selection controls. `middle` is cheap and robust. Switch to
# `hidden_alignment` to score source-target hidden similarity before LoRA attach.
layer_selection:
  strategy: middle  # manual | middle | hidden_alignment
  selected_layers: null
  top_k: 12
  min_layer: 4
  max_layer: null
  hidden_alignment_batches: 8
  hidden_alignment_batch_size: 1

# PEFT LoRA. Selected-layer LoRA is the default update mechanism.
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

save_dir: ./finetuned/${method_name}_${forget_objective}_${lr}_${forget_split}_${num_epochs}_${source_language}
lora_save_dir: ${save_dir}/lora_adapter
save_merged_model: false
merged_save_dir: ${save_dir}/merged
overwrite_dir: false
save_every_epoch: true
log_steps: 5
eval_only: false

# Optional smoke/full eval command generation uses evaluate_util.py externally.
eval:
  languages: [en, ar, fa, fr, hi, id, iw, ja, ko, ru]
  batch_size: 1
  perturb_eval_chunk_size: 1
  ds_size: null
  save_case_studies: true
