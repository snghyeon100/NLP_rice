model_family: qwen3_5_2b
model_path: ./finetuned
reference_model_path: ${model_path}
method_name: subspace_xlingual

language: en
target_languages: [ko]
primary_target_language: ko
split: forget01
retain_split: retain99

forget_data_path: locuslab/TOFU
forget_split: ${split}
retain_data_path: locuslab/TOFU
utility_data_path: ./dataset/full_merged_all_10_lang

parallel_utility_data_path:
  en:
    path: locuslab/TOFU
    split: ${retain_split}
    language: en
  tgt:
    path: ./dataset/retain99_${primary_target_language}
    language: ${primary_target_language}

question_key: question
answer_key: answer
max_length: 500
decontaminate_utility: true

lr: 2e-5
batch_size: 2
gradient_accumulation_steps: 1
num_epochs: 5
weight_decay: 0.01
seed: 42
save_model: true
eval_only: false
eval_while_train: false
save_dir: ${model_path}/${method_name}_${lr}_${split}_${num_epochs}_${primary_target_language}

alpha: 1.0
beta: 1.0
gamma: 1.0

use_lora: true
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
full_finetune: false

run_localization: true
selected_layers_path: null
localization_num_batches: 8
select_top_k_layers: 8
select_score_threshold: null
score_mode: additive
share_score_type: hidden
share_eta: 1.0
util_lambda: 1.0
pooling: mean
score_eps: 1e-12

use_projection: true
preserve_rank: 4
max_preserve_batches: 8
preserve_basis_path: null

logging_steps: 10
save_steps: null
run_eval_after_train: false

eval:
  jobs:
    - language: en
      save_dir: ${save_dir}/eval_results/en
      data_path: [locuslab/TOFU, locuslab/TOFU, locuslab/TOFU, locuslab/TOFU]
      split: ${split}_perturbed
      split_list:
        - retain_perturbed
        - real_authors_perturbed
        - world_facts_perturbed
        - ${split}_perturbed
      eval_task: [eval_log, eval_real_author_wo_options, eval_real_world_wo_options, eval_log_forget]
      question_key: [question, question, question, question]
      answer_key: [answer, answer, answer, answer]
      base_answer_key: [paraphrased_answer, answer, answer, paraphrased_answer]
      perturbed_answer_key: [perturbed_answer, perturbed_answer, perturbed_answer, perturbed_answer]
      generation:
        max_length: 200
        max_new_tokens: null
      save_generated_text: true
      ds_size: null
      overwrite: true
      use_pretrained: false
      batch_size: 4
      retain_result: null
    - language: ${primary_target_language}
      save_dir: ${save_dir}/eval_results/${primary_target_language}
      data_path:
        - ./dataset/retain_perturbed_${primary_target_language}
        - ./dataset/real_authors_perturbed_${primary_target_language}
        - ./dataset/world_facts_perturbed_${primary_target_language}
        - ./dataset/${split}_perturbed_${primary_target_language}
      split: ${split}_perturbed
      split_list:
        - retain_perturbed
        - real_authors_perturbed
        - world_facts_perturbed
        - ${split}_perturbed
      eval_task: [eval_log, eval_real_author_wo_options, eval_real_world_wo_options, eval_log_forget]
      question_key: [question, question, question, question]
      answer_key: [answer, answer, answer, answer]
      base_answer_key: [paraphrased_answer, answer, answer, paraphrased_answer]
      perturbed_answer_key: [perturbed_answer, perturbed_answer, perturbed_answer, perturbed_answer]
      generation:
        max_length: 200
        max_new_tokens: null
      save_generated_text: true
      ds_size: null
      overwrite: true
      use_pretrained: false
      batch_size: 4
      retain_result: null
