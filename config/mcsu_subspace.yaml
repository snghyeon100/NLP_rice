model_family: aya-expanse-8B
model_path: ../scratch/tofu_finetuned_5epoch_aya_all_lang_5e5/
output_dir: ./mcsu_subspaces/aya_tofu_forget01

languages: [en, fr, ar, ja, ru, fa, ko, hi, iw, id]
train_languages: [en, fr, ko, ja]

split: forget01
data_path: locuslab/TOFU

# For translated non-English data, support the existing repo style.
translated_data_root: ./trans_tofu
forget_template: "forget01_perturbed_{language}"
retain_template: "retain99_{language}"

layer_ids: null
k_lang: 16
k_shared: 8
row_normalize_z: true
mean_center_z: false
batch_size: 4
prompt_max_length: 256
torch_dtype: bfloat16
seed: 42
random_control: false
max_examples_per_language: null
device: auto
