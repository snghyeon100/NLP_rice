model_path: ./finetuned/checkpoint-8333/npo_2e-05_forget01_5_en/
model_family: qwen3_5_2b
language: ru
save_dir: ${model_path}/eval_results/ds_size${ds_size}_${language}

data_path:
  - ./dataset/retain_perturbed_${language}
  - ./dataset/real_authors_perturbed_${language}
  - ./dataset/world_facts_perturbed_${language}
  - ./dataset/forget01_perturbed_${language}

split: forget01_perturbed
split_list:
  - retain_perturbed
  - real_authors_perturbed
  - world_facts_perturbed
  - ${split}

question_key: [question, question, question, question]
answer_key: [answer, answer, answer, answer]

base_answer_key: [paraphrased_answer, answer, answer, paraphrased_answer]
perturbed_answer_key: [perturbed_answer, perturbed_answer, perturbed_answer, perturbed_answer]

eval_task: [eval_log, eval_real_author_wo_options, eval_real_world_wo_options, eval_log_forget]

generation:
  max_length: 200
  max_new_tokens: null

save_generated_text: true
ds_size: null
overwrite: true
use_pretrained: false
batch_size: 4
reinitialize_weights: false
retain_result: null
